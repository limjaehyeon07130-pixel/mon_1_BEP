<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Kingdom 재무 시뮬레이터 v12.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 380px 1fr; gap: 25px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; color: #475569; }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }
        input[type="text"]:focus { border-color: var(--primary); outline: none; }
        
        .stat-box {
            padding: 15px;
            border-radius: 10px;
            margin-top: 12px;
            background: #f1f5f9;
            border-left: 5px solid var(--primary);
        }
        .stat-label { font-size: 12px; color: #64748b; font-weight: 700; }
        .stat-val { font-size: 18px; font-weight: 700; color: #0f172a; }
        
        .chart-container { position: relative; height: 550px; width: 100%; }
        .summary-note {
            margin-top: 20px;
            padding: 15px;
            background: #f0fdf4;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid #dcfce7;
            color: #166534;
        }
        .highlight-formula { background: #dcfce7; padding: 2px 4px; font-weight: bold; border-radius: 4px; color: #166534; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Quest Kingdom <span style="color:var(--primary)">재무 시뮬레이션 v12.0</span></h1>
        <p>수익 다각화 및 비용 세분화 모델 (판관비 변수 추가)</p>
    </div>

    <div class="grid">
        <div class="card">
            <h3 style="margin-top:0; padding-bottom:10px; border-bottom:1px solid #eee;">시뮬레이션 변수 설정</h3>
            
            <div class="input-group">
                <label>Year 1 시작 사용자 (명)</label>
                <input type="text" id="startUsers" value="35,000">
            </div>

            <div class="input-group">
                <label>Year 2 시작 광고 수익 (원)</label>
                <input type="text" id="baseAdRev" value="200,000,000">
            </div>

            <div class="input-group">
                <label>연간 판관비 (인건비, 마케팅 등)</label>
                <input type="text" id="sgaExpense" value="150,000,000">
                <small style="color:#64748b;">* 운영에 필요한 가변적 고정비</small>
            </div>

            <div class="input-group">
                <label>매출원가 (고정)</label>
                <div style="padding: 12px; background: #fef2f2; border-radius: 8px; font-weight: bold; color: var(--danger); border: 1px solid #fee2e2; text-align: right;">연 200,000,000원</div>
            </div>

            <div class="stat-box">
                <div class="stat-label">Year 1 총 매출</div>
                <div class="stat-val" id="y1Rev">0억 원</div>
            </div>

            <div class="stat-box" style="border-left-color: var(--secondary);">
                <div class="stat-label">Year 5 영업이익</div>
                <div class="stat-val" id="y5Profit">0억 원</div>
            </div>

            <div class="summary-note">
                <strong>재무 구조 설명:</strong><br>
                - <strong>매출원가:</strong> 2억 원 고정 (서버비 등)<br>
                - <strong>판관비:</strong> 사용자가 설정한 고정 금액 차감<br>
                - <strong>영업이익:</strong> 총 매출 - (원가 + 판관비)<br>
                - <strong>성장 로직:</strong> B2C(1.1^4), 광고(1.1) 동일 적용
            </div>
        </div>

        <div class="card">
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    function formatNumber(n) {
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function unformatNumber(s) {
        return parseInt(s.replace(/,/g, "")) || 0;
    }

    const startUsersInput = document.getElementById('startUsers');
    const baseAdRevInput = document.getElementById('baseAdRev');
    const sgaExpenseInput = document.getElementById('sgaExpense');
    const y1RevDisp = document.getElementById('y1Rev');
    const y5ProfitDisp = document.getElementById('y5Profit');

    let mainChart;

    [startUsersInput, baseAdRevInput, sgaExpenseInput].forEach(input => {
        input.addEventListener('input', function(e) {
            let val = unformatNumber(e.target.value);
            e.target.value = formatNumber(val);
            calculate();
        });
    });

    function calculate() {
        const startUsers = unformatNumber(startUsersInput.value);
        const initialAdRevInput = unformatNumber(baseAdRevInput.value);
        const sgaExpense = unformatNumber(sgaExpenseInput.value);
        const fixedCogs = 200000000; // 매출원가 고정 2억
        
        const labels = ['Year 1', 'Year 2', 'Year 3', 'Year 4', 'Year 5'];
        const revenueData = [];
        const totalExpenseData = [];
        const opProfitData = [];

        let currentB2C = 0;
        let currentAdRev = 0;

        for (let i = 1; i <= 5; i++) {
            // 수익 계산
            if (i === 1) {
                currentB2C = startUsers * 0.025 * Math.pow(1.25, 3) * 9900 * 12;
            } else {
                currentB2C = currentB2C * Math.pow(1.1, 4);
            }

            if (i === 1) {
                currentAdRev = 0;
            } else if (i === 2) {
                currentAdRev = initialAdRevInput; 
            } else {
                currentAdRev = currentAdRev * 1.1;
            }

            let totalRev = currentB2C + currentAdRev;
            // 비용 합계 = 고정 원가(2억) + 판관비(입력값)
            let totalExpense = fixedCogs + sgaExpense;
            let opProfit = totalRev - totalExpense;

            revenueData.push(totalRev / 100000000);
            totalExpenseData.push(totalExpense / 100000000);
            opProfitData.push(opProfit / 100000000);

            if (i === 1) y1RevDisp.innerText = (totalRev / 100000000).toFixed(2) + '억 원';
            if (i === 5) y5ProfitDisp.innerText = (opProfit / 100000000).toFixed(2) + '억 원';
        }

        renderChart(labels, revenueData, totalExpenseData, opProfitData);
    }

    function renderChart(labels, revs, costs, profits) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (mainChart) mainChart.destroy();

        mainChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '영업이익 (억 원)',
                        data: profits,
                        type: 'line',
                        borderColor: '#10b981',
                        backgroundColor: '#10b981',
                        borderWidth: 4,
                        tension: 0.3,
                        pointRadius: 6,
                        fill: false,
                        order: 1
                    },
                    {
                        label: '총 매출액 (억 원)',
                        data: revs,
                        backgroundColor: 'rgba(79, 70, 229, 0.7)',
                        borderRadius: 6,
                        order: 2
                    },
                    {
                        label: '총 비용 (원가+판관비)',
                        data: costs,
                        backgroundColor: 'rgba(239, 68, 68, 0.4)',
                        borderRadius: 6,
                        order: 3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: '금액 (단위: 억 원)', font: { weight: 'bold' } }
                    }
                },
                plugins: {
                    legend: { position: 'top' },
                    tooltip: { 
                        mode: 'index', 
                        intersect: false,
                        callbacks: {
                            label: (ctx) => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2) + '억'
                        }
                    }
                }
            }
        });
    }

    window.onload = calculate;
</script>

</body>
</html>
